<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <!-- Maskable icon: background bleeds to edges, content in safe zone (center 80%) -->
  <rect width="512" height="512" fill="#0d1627"/>
  <!-- Chalk stripes across full bleed -->
  <line x1="80"  y1="0" x2="80"  y2="512" stroke="#C9A84C" stroke-width="2" opacity="0.1"/>
  <line x1="160" y1="0" x2="160" y2="512" stroke="#C9A84C" stroke-width="2" opacity="0.1"/>
  <line x1="240" y1="0" x2="240" y2="512" stroke="#C9A84C" stroke-width="2" opacity="0.1"/>
  <line x1="320" y1="0" x2="320" y2="512" stroke="#C9A84C" stroke-width="2" opacity="0.1"/>
  <line x1="400" y1="0" x2="400" y2="512" stroke="#C9A84C" stroke-width="2" opacity="0.1"/>
  <line x1="480" y1="0" x2="480" y2="512" stroke="#C9A84C" stroke-width="2" opacity="0.1"/>
  <!-- D centered in safe zone (51px inset each side = 80% safe zone) -->
  <text x="256" y="368" text-anchor="middle" font-family="Georgia,Times New Roman,serif" font-weight="900" font-size="290" fill="#C9A84C">D</text>
</svg>
